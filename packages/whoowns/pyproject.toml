[build-system]
requires = ["uv_build>=0.10.0,<0.12"]
build-backend = "uv_build"

[project]
name = "whoowns"
version = "0.6.0"
description = "Print the GitHub owner of a file or folder based on CODEOWNERS"
readme = "README.md"
authors = [
  {name = "Markus Hofbauer"},
  {name = "Chris Bachhuber"}
]
license = "MIT"
requires-python = ">=3.10"
dependencies = []
keywords = ["codeowners", "github", "cli", "ownership"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Software Development :: Version Control :: Git"
]

[project.scripts]
whoowns = "whoowns.find_owner:main"

[project.urls]
Homepage = "https://github.com/hofbi/dev-tools"
Repository = "https://github.com/hofbi/dev-tools"
Issues = "https://github.com/hofbi/dev-tools/issues"

[tool.uv.build-backend]
module-root = "" # required to avoid the "src" layout, which is the default for uv_build
